name: Build Python Wheel

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-aarch64:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: ax650
            chip: AX650
            bsp_repo: AXERA-TECH/ax650n_bsp_sdk
            bsp_dir: ax650n_bsp_sdk
          - platform: ax630c
            chip: AX630C
            bsp_repo: AXERA-TECH/ax620e_bsp_sdk
            bsp_dir: ax620e_bsp_sdk
          - platform: ax8850
            chip: AX8850
            bsp_repo: Abandon-ht/axcl_bsp_sdk
            bsp_dir: axcl_bsp_sdk

    steps:
      - uses: actions/checkout@v4

      - name: Clone BSP SDK
        run: |
          git clone https://github.com/${{ matrix.bsp_repo }}.git --depth=1 ${{ matrix.bsp_dir }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build (aarch64)
        run: |
          docker run --rm --platform linux/arm64 \
            -e PLATFORM -e CHIP \
            -v ${{ github.workspace }}:/ws -w /ws \
            arm64v8/python:3.10-slim \
            bash -c "
              apt-get update -qq &&
              apt-get install -y -qq cmake build-essential &&
              pip install pybind11 build numpy -q &&
              mkdir -p build_\$PLATFORM && cd build_\$PLATFORM &&
              cmake ../cpp \
                -DCHIP_\$CHIP=ON \
                -DCMAKE_INSTALL_PREFIX=../install/\$PLATFORM \
                -DCMAKE_BUILD_TYPE=Release &&
              make -j\$(nproc) ax_asr_api main &&
              mkdir -p ../install/\$PLATFORM/lib &&
              cp libax_asr_api.a ../install/\$PLATFORM/lib/ &&
              cp main ../install/\$PLATFORM/ &&
              mkdir -p /ws/install/\$PLATFORM/include &&
              cp /ws/cpp/src/api/ax_asr_api.h /ws/install/\$PLATFORM/include/ &&
              ln -sf /ws/README.md /ws/python/README.md && cd /ws/python &&
              bash build_whl.sh /ws/install/\$PLATFORM
            "
        env:
          PLATFORM: ${{ matrix.platform }}
          CHIP: ${{ matrix.chip }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ax_asr-${{ matrix.platform }}
          path: |
            install/${{ matrix.platform }}/lib/libax_asr_api.a
            install/${{ matrix.platform }}/include/ax_asr_api.h
            install/${{ matrix.platform }}/main
            python/dist/*.whl

  upload-release:
    if: github.event_name == 'release'
    needs: build-aarch64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: ax_asr-*
          path: wheels
          merge-multiple: true

      - name: Upload to Release
        run: |
          cd wheels
          for f in ax_asr-*/*.whl ax_asr-*/main ax_asr-*/libax_asr_api.a ax_asr-*/ax_asr_api.h; do
            if [ -f "$f" ]; then
              gh release upload ${{ github.event.release.tag_name }} "$f"
            fi
          done
        env:
          GH_TOKEN: ${{ github.token }}
