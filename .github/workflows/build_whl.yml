name: Build Python Wheel

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-aarch64:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python_version: ["3.10", "3.11", "3.12", "3.13"]
        platform:
          - name: ax650
            chip: AX650
            bsp_repo: AXERA-TECH/ax650n_bsp_sdk
            bsp_dir: ax650n_bsp_sdk
          - name: ax630c
            chip: AX630C
            bsp_repo: AXERA-TECH/ax620e_bsp_sdk
            bsp_dir: ax620e_bsp_sdk
          - name: ax8850
            chip: AX8850
            bsp_repo: Abandon-ht/axcl_bsp_sdk
            bsp_dir: axcl_bsp_sdk

    steps:
      - uses: actions/checkout@v4

      - name: Set artifact slug
        id: slug
        run: |
          echo "artifact=ax_asr-${{ matrix.platform.name }}-cp$(echo ${{ matrix.python_version }} | tr -d '.')" >> $GITHUB_OUTPUT

      - name: Clone BSP SDK
        run: |
          git clone https://github.com/${{ matrix.platform.bsp_repo }}.git --depth=1 ${{ matrix.platform.bsp_dir }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build (aarch64)
        run: |
          docker run --rm --platform linux/arm64 \
            -e PLATFORM -e CHIP \
            -v ${{ github.workspace }}:/ws -w /ws \
            arm64v8/python:${{ matrix.python_version }}-slim \
            bash -c "
              set -e &&
              apt-get update -qq &&
              apt-get install -y -qq cmake build-essential &&
              pip install pybind11 build numpy -q &&
              mkdir -p build_\$PLATFORM && cd build_\$PLATFORM &&
              cmake ../cpp \
                -DCHIP_\$CHIP=ON \
                -DCMAKE_INSTALL_PREFIX=../install/\$PLATFORM \
                -DCMAKE_BUILD_TYPE=Release &&
              make -j\$(nproc) ax_asr_api main &&
              mkdir -p ../install/\$PLATFORM/lib ../install/\$PLATFORM/include &&
              cp libax_asr_api.a ../install/\$PLATFORM/lib/ &&
              cp main ../install/\$PLATFORM/ &&
              cp /ws/cpp/src/api/ax_asr_api.h ../install/\$PLATFORM/include/ &&
              ln -sf /ws/README.md /ws/python/README.md && cd /ws/python &&
              bash build_whl.sh /ws/install/\$PLATFORM &&
              mkdir -p /ws/dist_\$PLATFORM &&
              cp /ws/python/dist/*.whl /ws/dist_\$PLATFORM/
            "
        env:
          PLATFORM: ${{ matrix.platform.name }}
          CHIP: ${{ matrix.platform.chip }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.slug.outputs.artifact }}
          path: dist_${{ matrix.platform.name }}/*

  upload-release:
    if: github.event_name == 'release'
    needs: build-aarch64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: ax_asr-*
          path: wheels
          merge-multiple: true

      - name: Upload to Release
        run: |
          find wheels -type f -name '*.whl' | while read f; do
            gh release upload ${{ github.event.release.tag_name }} "$f" --clobber
          done
        env:
          GH_TOKEN: ${{ github.token }}
